name: MacOS noVNC + Cloudflare

on:
  workflow_dispatch:

jobs:
  mac-novnc:
    runs-on: macos-latest
    steps:
      - name: Setup User & VNC
        run: |
          USERNAME="vncuser"
          PASSWORD="VNCpass123!"
          sudo sysadminctl -addUser $USERNAME -fullName "VNC User" -password "$PASSWORD" -admin
          sudo mkdir -p /Users/$USERNAME
          sudo chown -R $USERNAME:staff /Users/$USERNAME
          sudo dscl . -create /Users/$USERNAME NFSHomeDirectory /Users/$USERNAME
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -users $USERNAME -privs -all -clientopts -setvnclegacy -vnclegacy yes
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent
          echo "Username: $USERNAME"
          echo "Password: $PASSWORD"

      - name: Setup noVNC & Cloudflare Tunnel
        run: |
          brew install cloudflared
          pipx install websockify
          git clone https://github.com/novnc/noVNC.git --depth 1
          cd noVNC
          ~/.local/bin/websockify --web=. 6080 localhost:5900 > /dev/null 2>&1 &
          cloudflared tunnel --url http://localhost:6080 --no-autoupdate &
          sleep 18
          echo "=================================================="
          echo "✅ noVNC SIAP PAKE HTTPS!"
          echo "Buka link ini di browser:"
          echo "https://[random].trycloudflare.com/vnc.html"
          echo "(ganti [random] dengan alamat lengkap yang muncul di log atas)"
          echo ""
          echo "Username : vncuser"
          echo "Password : VNCpass123!"
          echo "=================================================="
          tail -f /dev/null

name: macos-arm-novnc

on: workflow_dispatch

jobs:
  run:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: 1. Setup User & VNC Server
        run: |
          sudo systemsetup -setcomputersleep Never
          sudo systemsetup -setdisplaysleep Never
          
          # Buat User Admin
          sudo sysadminctl -addUser admin -fullName "Administrator" -password "password123" -admin

          # Aktifkan VNC Server Apple
          KICKSTART="/System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart"
          sudo $KICKSTART -deactivate -configure -access -off
          sudo $KICKSTART -configure -allowAccessFor -allUsers -privs -all
          sudo $KICKSTART -configure -clientopts -setvnclegacy -vnclegacy yes
          sudo $KICKSTART -configure -clientopts -setvncpw -vncpw 12345678
          sudo $KICKSTART -activate -restart -agent -console

      - name: 2. Install noVNC & Websockify
        run: |
          # Download noVNC
          git clone https://github.com/novnc/noVNC.git
          git clone https://github.com/novnc/websockify noVNC/utils/websockify
          
          # Jalankan noVNC Proxy di background (Port 6080)
          ./noVNC/utils/novnc_proxy --vnc localhost:5900 --listen 6080 &

      - name: 3. Start Tunnel (Bore)
        run: |
          # Download bore
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-v0.6.0-aarch64-apple-darwin.tar.gz | tar -xz
          sudo mv bore /usr/local/bin/
          
          # Forward PORT 6080 (Milik noVNC) ke public
          bore local 6080 --to bore.pub > bore.log 2>&1 &
          
          sleep 5
          echo "=========================================================="
          echo "🌐 BUKA BROWSER (Chrome/Edge/Safari) DAN MASUKKAN LINK:"
          cat bore.log
          echo " "
          echo "PENTING! Tambahkan 'http://' di depan dan '/vnc.html' di belakang"
          echo "Contoh: http://bore.pub:12345/vnc.html"
          echo "=========================================================="
          echo "Password VNC: 12345678"
          echo "User Mac: admin / password123"
          echo "=========================================================="

      - name: 4. Keep Alive 
        run: |
         end=$((SECONDS+21600))
         while [ $SECONDS -lt $end ]; do
            echo "Mac Alive (noVNC) - Sisa waktu: $(( (end - SECONDS) / 60 )) menit"
            sleep 60
         done

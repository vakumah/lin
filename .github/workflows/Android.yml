name: Private Android Web Preview (Redroid ARM-Native)

on:
  workflow_dispatch:

jobs:
  android-preview:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y adb wget curl

      - name: Run Native Android (Redroid Docker)
        run: |
          echo "Menyalakan Android via Docker (Native ARM64 tanpa KVM)..."
          
          docker run -itd --rm --privileged \
            --name redroid \
            -p 5555:5555 \
            redroid/redroid:12.0.0-latest \
            androidboot.redroid_gpu_mode=guest \
            androidboot.redroid_fps=30
          
          echo "Menunggu Android booting..."
          
          for i in {1..20}; do
            echo "Mencoba konek ADB (Percobaan $i)..."
            
            adb connect 127.0.0.1:5555 || true
            STATUS=$(adb -s 127.0.0.1:5555 get-state 2>/dev/null || echo "offline")
            
            if [ "$STATUS" == "device" ]; then
              echo "✅ Android berhasil menyala dan siap digunakan!"
              break
            fi
            
            echo "Android masih proses booting, tunggu 3 detik..."
            sleep 3
          done
          
          adb devices

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # =========================================================
      # FIX 502 BAD GATEWAY: SEMUA PROSES DIGABUNG DI 1 STEP SINI
      # =========================================================
      - name: Start Web UI, Tunnel & Hold
        run: |
          echo "Menyiapkan Web Streaming (ws-scrcpy)..."
          git clone https://github.com/NetrisTV/ws-scrcpy.git
          cd ws-scrcpy
          npm install
          
          # Nyalain web di background
          npm start &
          
          echo "Tunggu server Node.js up (10 detik)..."
          sleep 10
          
          echo "Mengunduh Cloudflare Tunnel..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64 -O cloudflared
          chmod +x cloudflared
          
          echo "Membuka jalur ke internet..."
          ./cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          
          echo "Menunggu URL Publik dari Cloudflare..."
          for i in {1..15}; do
            URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' tunnel.log | head -n 1)
            
            if [ ! -z "$URL" ]; then
              break
            fi
            sleep 2
          done
          
          echo "=========================================================="
          echo "📱 DISPOSABLE APPETIZE LU UDAH NYALA BRAY! 📱"
          echo "🔗 Klik link ini buat ngetes Emulator di Browser:"
          echo "👉 $URL"
          echo "=========================================================="
          
          echo "⏳ Mesin ditahan selama 1 Jam."
          echo "🛑 JANGAN LUPA KLIK 'CANCEL WORKFLOW' kalau udah selesai test."
          
          # Nahan step ini biar gak selesai, otomatis web & tunnel gak dibunuh
          sleep 3600
